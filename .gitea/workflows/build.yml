name: Build

# Gitea build action mirroring the GitHub CI (Python): install + pytest (unit only).
# The neo4j extra / integration tests are excluded — they need a live Neo4j service.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest -q
